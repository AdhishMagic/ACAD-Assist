services:
  ai-layer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: acad_assist_ai_layer
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DEBUG=True
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - LOG_LEVEL=INFO
    ports:
      - "8001:8001"
    volumes:
      - ./src:/app/src
      - ./tests:/app/tests
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - acad_network

networks:
  acad_network:
    driver: bridge
