services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: acad_assist_frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_API_TARGET: http://web:8000
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      web:
        condition: service_started
    networks:
      - acad_network

  db:
    image: pgvector/pgvector:pg15
    container_name: acad_assist_db
    restart: unless-stopped
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - acad_network

  web:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: acad_assist_web
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - acad_network

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  acad_network:
    driver: bridge
